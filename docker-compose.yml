version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: gulmigang2-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: gulmigang2024
      MONGO_INITDB_DATABASE: gulmigang
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - gulmigang-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gulmigang2-backend
    restart: unless-stopped
    ports:
      - "5007:5007"
    environment:
      NODE_ENV: development
      PORT: 5007
      MONGODB_URI: mongodb://admin:gulmigang2024@mongodb:27017/gulmigang?authSource=admin
      MONGO_URI: mongodb://admin:gulmigang2024@mongodb:27017/gulmigang?authSource=admin
      JWT_SECRET: gulmigang-super-secret-key-change-in-production
      JWT_REFRESH_SECRET: gulmigang-refresh-secret-key-2024
      FRONTEND_URL: http://localhost:5178
      UPLOAD_MAX_SIZE: 10485760
      SESSION_TIMEOUT: 86400000
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - backend_uploads:/usr/src/app/uploads
    networks:
      - gulmigang-network
    depends_on:
      mongodb:
        condition: service_healthy
    command: npm run dev

  # Frontend Vue Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gulmigang2-frontend
    restart: unless-stopped
    ports:
      - "5178:5178"
    environment:
      VITE_API_URL: http://localhost:5007/api
      VITE_WS_URL: http://localhost:5007
      VITE_APP_NAME: GulmiGang
      VITE_APP_VERSION: 1.0.0
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - gulmigang-network
    depends_on:
      - backend
    command: npm run dev:docker

networks:
  gulmigang-network:
    driver: bridge
    name: gulmigang-network

volumes:
  mongodb_data:
    name: gulmigang_mongodb_data
  mongodb_config:
    name: gulmigang_mongodb_config
  backend_uploads:
    name: gulmigang_backend_uploads
